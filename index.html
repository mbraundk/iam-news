<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAM News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --text-muted: #999;
      --accent: #1a1a1a;
      --accent-light: #f0ede8;
      --badge-bg: #1a1a1a;
      --badge-text: #ffffff;
      --link: #2a52a0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1c1c1a;
        --border: rgba(255,255,255,0.08);
        --text-primary: #f0ede8;
        --text-secondary: #999;
        --text-muted: #666;
        --accent-light: #252522;
        --badge-bg: #f0ede8;
        --badge-text: #1a1a1a;
        --link: #7fa8e8;
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 2rem;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .logo-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header-meta {
      font-size: 13px;
      color: var(--text-muted);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .section-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .count-badge {
      font-size: 12px;
      color: var(--text-muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      transition: background 0.15s;
    }

    .card:hover { background: var(--accent-light); }

    .card-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--accent-light);
      position: relative;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .card:hover .card-img { transform: scale(1.03); }

    .card-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder-icon {
      font-size: 32px;
      opacity: 0.2;
    }

    .card-body {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .source {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--badge-bg);
      color: var(--badge-text);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .card-summary {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-secondary);
      flex: 1;
    }

    .card-link {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .read-more {
      font-size: 12px;
      font-weight: 500;
      color: var(--link);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .read-more:hover { text-decoration: underline; }

    .arrow { font-size: 14px; color: var(--text-muted); }

    .state-box {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .state-box p { font-size: 15px; margin-top: 0.5rem; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--text-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 1.5rem;
      color: #c00;
      font-size: 14px;
    }

    @media (prefers-color-scheme: dark) {
      .error-box { background: #2a1010; border-color: #5a1f1f; color: #f87171; }
    }

    footer {
      border-top: 1px solid var(--border);
      margin-top: 3rem;
      padding: 2rem;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    @media (max-width: 680px) {
      main { padding: 1rem; }
      header { padding: 0 1rem; }
      .grid { grid-template-columns: 1fr; border-radius: 8px; }
      .logo h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <h1>IAM News</h1>
      <span class="logo-tag">Identity &amp; Access Management</span>
    </div>
    <div class="header-meta" id="updated">Loading...</div>
  </div>
</header>

<main>
  <div class="section-bar">
    <span class="section-label">Latest articles</span>
    <span class="count-badge" id="count"></span>
  </div>
  <div id="content">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading latest IAM news...</p>
    </div>
  </div>
</main>

<footer>
  Updated daily · Powered by Claude AI · IAM News
</footer>

<script>
async function load() {
  try {
    const res = await fetch('news.json?t=' + Date.now());
    if (!res.ok) throw new Error('news.json not found — run the fetch script first.');
    const data = await res.json();

    document.getElementById('updated').textContent = 'Updated ' + (data.updated || '');
    document.getElementById('count').textContent = data.articles.length + ' articles';

    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.innerHTML = data.articles.map(cardHTML).join('');
    document.getElementById('content').innerHTML = '';
    document.getElementById('content').appendChild(grid);
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="error-box">Could not load news.json: ' + e.message + '</div>';
    document.getElementById('updated').textContent = '';
  }
}

function cardHTML(a) {
  const img = a.image
    ? `<img class="card-img" src="${esc(a.image)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder><span class=placeholder-icon>&#128240;</span></div>'">`
    : `<div class="card-img-placeholder"><span class="placeholder-icon">&#128240;</span></div>`;

  return `<div class="card">
    <div class="card-img-wrap">${img}</div>
    <div class="card-body">
      <div class="card-meta">
        <span class="source">${esc(a.source || '')}</span>
        <span class="date">${esc(a.date || '')}</span>
      </div>
      <div class="card-title">${esc(a.title)}</div>
      <div class="card-summary">${esc(a.summary)}</div>
      <div class="card-link">
        <a class="read-more" href="${esc(a.url)}" target="_blank" rel="noopener">Read full article</a>
        <span class="arrow">→</span>
      </div>
    </div>
  </div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAM News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f9;
      --surface: #ffffff;
      --border: #dadde1;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --text-muted: #80868b;
      --blue: #1a73e8;
      --blue-hover: #1557b0;
      --chip-bg: #e8f0fe;
      --chip-text: #1a73e8;
      --hover: #f8f9fa;
      --divider: #e8eaed;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202124;
        --surface: #2d2e30;
        --border: #3c4043;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-muted: #80868b;
        --blue: #8ab4f8;
        --blue-hover: #aecbfa;
        --chip-bg: #1e3a5f;
        --chip-text: #8ab4f8;
        --hover: #35363a;
        --divider: #3c4043;
      }
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-google {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .logo-news {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text-primary);
    }

    .logo-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1a73e8;
      margin: 0 1px 8px;
      flex-shrink: 0;
    }

    .topbar-spacer { flex: 1; }

    .topbar-updated {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── TOPIC CHIPS ── */
    .chips-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .chips-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      padding: 10px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .chips-inner::-webkit-scrollbar { display: none; }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: background 0.1s, color 0.1s;
    }

    .chip:hover { background: var(--hover); }

    .chip.active {
      background: var(--chip-bg);
      color: var(--chip-text);
      border-color: transparent;
    }

    /* ── LAYOUT ── */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 368px;
      gap: 24px;
      align-items: start;
    }

    /* ── MAIN FEED ── */
    .feed { display: flex; flex-direction: column; gap: 4px; }

    .feed-section {
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .story-cluster {
      padding: 16px;
      border-bottom: 1px solid var(--divider);
      cursor: pointer;
      transition: background 0.1s;
    }

    .story-cluster:last-child { border-bottom: none; }
    .story-cluster:hover { background: var(--hover); }

    .cluster-main {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .cluster-text { flex: 1; min-width: 0; }

    .cluster-source {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .source-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--chip-bg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--chip-text);
      flex-shrink: 0;
    }

    .cluster-title {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .story-cluster:hover .cluster-title { color: var(--blue); }

    .cluster-summary {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .cluster-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cluster-thumb {
      width: 96px;
      height: 72px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .cluster-thumb-placeholder {
      width: 96px;
      height: 72px;
      border-radius: 8px;
      background: var(--bg);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cluster-thumb-placeholder svg { opacity: 0.3; }

    .read-link {
      color: var(--blue);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
    }

    .read-link:hover { text-decoration: underline; color: var(--blue-hover); }

    /* ── HERO STORY (first item) ── */
    .story-hero {
      padding: 0;
      border-bottom: 1px solid var(--divider);
      cursor: pointer;
      transition: background 0.1s;
    }

    .story-hero:hover { background: var(--hover); }

    .hero-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      border-radius: 8px 8px 0 0;
    }

    .hero-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .story-hero:hover .hero-img { transform: scale(1.02); }

    .hero-body { padding: 16px; }

    .hero-source {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hero-title {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .story-hero:hover .hero-title { color: var(--blue); }

    .hero-summary {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .hero-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .sidebar-card {
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--divider);
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .sidebar-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--divider);
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .sidebar-item:last-child { border-bottom: none; }
    .sidebar-item:hover { background: var(--hover); }

    .sidebar-item-text { flex: 1; min-width: 0; }

    .sidebar-item-source {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .sidebar-item-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-primary);
    }

    .sidebar-item:hover .sidebar-item-title { color: var(--blue); }

    .sidebar-thumb {
      width: 56px; height: 56px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .sidebar-thumb-ph {
      width: 56px; height: 56px;
      border-radius: 4px;
      background: var(--bg);
      flex-shrink: 0;
    }

    /* ── LOADING / ERROR ── */
    .state-box {
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: var(--surface);
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 1.5rem;
      color: #c00;
      font-size: 13px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      margin-top: 24px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; padding: 16px; }
      .sidebar { display: none; }
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .chips-bar { padding: 0 16px; }
      .page { padding: 12px; gap: 12px; }
      .cluster-thumb, .cluster-thumb-placeholder { width: 72px; height: 56px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="logo" href="#">
      <span class="logo-google">IAM</span>
      <span class="logo-dot"></span>
      <span class="logo-news">News</span>
    </a>
    <div class="topbar-spacer"></div>
    <div class="topbar-updated" id="updated"></div>
  </div>
</div>

<div class="chips-bar">
  <div class="chips-inner">
    <div class="chip active">All</div>
    <div class="chip">Zero Trust</div>
    <div class="chip">PAM</div>
    <div class="chip">Identity Gov.</div>
    <div class="chip">SSO &amp; MFA</div>
    <div class="chip">Okta</div>
    <div class="chip">Microsoft Entra</div>
    <div class="chip">CyberArk</div>
    <div class="chip">Standards</div>
  </div>
</div>

<div class="page">
  <div class="feed" id="feed">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading IAM news…</p>
    </div>
  </div>
  <div class="sidebar" id="sidebar"></div>
</div>

<footer>Updated daily · IAM News</footer>

<script>
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initials(source) {
  return (source || '?').charAt(0).toUpperCase();
}

function thumb(url, w, h, r) {
  if (!url) return '';
  return `<img style="width:${w}px;height:${h}px;border-radius:${r}px;object-fit:cover;flex-shrink:0" src="${esc(url)}" alt="" loading="lazy" onerror="this.remove()" />`;
}

function heroCard(a) {
  const imgHtml = a.image
    ? `<div class="hero-img-wrap"><img class="hero-img" src="${esc(a.image)}" alt="" loading="lazy" onerror="this.parentElement.remove()"></div>`
    : '';
  return `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="story-hero" style="text-decoration:none;display:block">
    ${imgHtml}
    <div class="hero-body">
      <div class="hero-source"><span class="source-dot">${initials(a.source)}</span>${esc(a.source)}</div>
      <div class="hero-title">${esc(a.title)}</div>
      <div class="hero-summary">${esc(a.summary)}</div>
      <div class="hero-meta">${esc(a.date)}</div>
    </div>
  </a>`;
}

function storyCard(a) {
  return `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="story-cluster" style="text-decoration:none;display:block">
    <div class="cluster-main">
      <div class="cluster-text">
        <div class="cluster-source"><span class="source-dot">${initials(a.source)}</span>${esc(a.source)}</div>
        <div class="cluster-title">${esc(a.title)}</div>
        <div class="cluster-summary">${esc(a.summary)}</div>
        <div class="cluster-meta">${esc(a.date)}</div>
      </div>
      ${thumb(a.image, 96, 72, 8)}
    </div>
  </a>`;
}

function sidebarItem(a) {
  const t = a.image
    ? `<img class="sidebar-thumb" src="${esc(a.image)}" alt="" loading="lazy" onerror="this.parentElement.removeChild(this)">`
    : '';
  return `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="sidebar-item" style="text-decoration:none">
    <div class="sidebar-item-text">
      <div class="sidebar-item-source">${esc(a.source)} · ${esc(a.date)}</div>
      <div class="sidebar-item-title">${esc(a.title)}</div>
    </div>
    ${t}
  </a>`;
}

async function load() {
  try {
    const res = await fetch('news.json?t=' + Date.now());
    if (!res.ok) throw new Error('news.json not found — run the fetch script first.');
    const data = await res.json();
    const articles = data.articles || [];

    document.getElementById('updated').textContent = data.updated ? 'Updated ' + data.updated : '';

    if (articles.length === 0) throw new Error('No articles found.');

    const hero = articles[0];
    const rest = articles.slice(1);
    const sideItems = articles.slice(0, 6);

    const feedEl = document.getElementById('feed');
    feedEl.innerHTML = `<div class="feed-section">
      ${heroCard(hero)}
      ${rest.map(a => storyCard(a)).join('')}
    </div>`;

    const sidebarEl = document.getElementById('sidebar');
    sidebarEl.innerHTML = `<div class="sidebar-card">
      <div class="sidebar-header">Top stories</div>
      ${sideItems.map(a => sidebarItem(a)).join('')}
    </div>`;

  } catch (e) {
    document.getElementById('feed').innerHTML =
      `<div class="error-box">Could not load news: ${esc(e.message)}</div>`;
  }
}

load();
</script>
</body>
</html>

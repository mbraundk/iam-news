<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>IAM News – Latest Identity & Access Management News</title>
  <meta name="description" content="Stay up to date with the latest news in Identity and Access Management (IAM). Daily coverage of zero trust, PAM, SSO, MFA, identity governance, and leading IAM vendors." />
  <meta name="keywords" content="IAM news, identity and access management, zero trust, privileged access management, PAM, SSO, MFA, Okta, CyberArk, SailPoint, Microsoft Entra, identity governance" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://iamnews.org/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="IAM News – Latest Identity & Access Management News" />
  <meta property="og:description" content="Daily news for IAM professionals. Covering zero trust, PAM, SSO, MFA, identity governance, and leading vendors." />
  <meta property="og:url" content="https://iamnews.org/" />
  <meta property="og:site_name" content="IAM News" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="IAM News – Latest Identity & Access Management News" />
  <meta name="twitter:description" content="Daily news for IAM professionals. Covering zero trust, PAM, SSO, MFA, identity governance, and leading vendors." />

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsMediaOrganization",
    "name": "IAM News",
    "url": "https://iamnews.org/",
    "description": "Daily news for Identity and Access Management professionals.",
    "inLanguage": "en"
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f9;
      --surface: #ffffff;
      --border: #dadde1;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --text-muted: #80868b;
      --blue: #1a73e8;
      --blue-hover: #1557b0;
      --hover: #f8f9fa;
      --divider: #e8eaed;
      --sponsored-bg: #fef9e7;
      --sponsored-border: #f9a825;
      --sponsored-label: #e65100;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202124;
        --surface: #2d2e30;
        --border: #3c4043;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-muted: #80868b;
        --blue: #8ab4f8;
        --blue-hover: #aecbfa;
        --hover: #35363a;
        --divider: #3c4043;
        --sponsored-bg: #2a2510;
        --sponsored-border: #f9a825;
        --sponsored-label: #ffb74d;
      }
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-inner {
      max-width: 1000px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-iam {
      font-family: 'Google Sans', sans-serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--blue);
    }

    .logo-news {
      font-family: 'Google Sans', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text-primary);
    }

    .topbar-spacer { flex: 1; }

    .topbar-updated {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── PAGE ── */
    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      font-family: 'Google Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    /* ── TOP STORIES ── */
    .top-stories-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Hero card — spans full left column */
    .hero-card {
      grid-row: 1 / 3;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      transition: box-shadow 0.15s;
    }

    .hero-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

    .hero-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--bg);
    }

    .hero-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .hero-card:hover .hero-img { transform: scale(1.02); }

    .hero-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .hero-source {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .source-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #e8f0fe;
      color: #1a73e8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }

    @media (prefers-color-scheme: dark) {
      .source-dot { background: #1e3a5f; color: #8ab4f8; }
    }

    .source-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .hero-title {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .hero-card:hover .hero-title { color: var(--blue); }

    .hero-summary {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-secondary);
      flex: 1;
    }

    .hero-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* Small top story cards */
    .small-card {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      transition: box-shadow 0.15s;
    }

    .small-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

    .small-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--bg);
    }

    .small-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .small-card:hover .small-img { transform: scale(1.02); }

    .small-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .small-source {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .small-title {
      font-family: 'Google Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .small-card:hover .small-title { color: var(--blue); }

    .small-summary {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-secondary);
      flex: 1;
    }

    .small-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── NEWS FEED ── */
    .news-feed {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .news-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 16px;
      border-bottom: 1px solid var(--divider);
      text-decoration: none;
      transition: background 0.1s;
    }

    .news-item:last-child { border-bottom: none; }
    .news-item:hover { background: var(--hover); }

    .news-text { flex: 1; min-width: 0; }

    .news-source {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .news-source-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .news-title {
      font-family: 'Google Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .news-item:hover .news-title { color: var(--blue); }

    .news-summary {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .news-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .news-thumb {
      width: 96px;
      height: 72px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    /* ── AD CARD (inline native) ── */
    .ad-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 16px;
      border-bottom: 1px solid var(--divider);
      background: var(--sponsored-bg);
      text-decoration: none;
    }

    .ad-item:last-child { border-bottom: none; }

    .ad-text { flex: 1; min-width: 0; }

    .ad-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sponsored-label);
      border: 1px solid var(--sponsored-border);
      border-radius: 3px;
      padding: 1px 5px;
      display: inline-block;
      margin-bottom: 5px;
    }

    .ad-title {
      font-family: 'Google Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .ad-description {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .ad-advertiser {
      font-size: 12px;
      color: var(--text-muted);
    }

    .ad-thumb {
      width: 96px;
      height: 72px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg);
    }

    /* ── LOADING / ERROR ── */
    .state-box {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: var(--surface);
      border: 1px solid #fcc;
      border-radius: 12px;
      padding: 1.5rem;
      color: #c00;
      font-size: 13px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .topbar { padding: 0 16px; }
      .page { padding: 16px; gap: 24px; }
      .top-stories-grid { grid-template-columns: 1fr; }
      .hero-card { grid-row: auto; }
      .news-thumb { width: 72px; height: 56px; }
      .ad-thumb { width: 72px; height: 56px; }
    }
  </style>
</head>
<body>

<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap">IAM News – Latest Identity and Access Management News</h1>

<header class="topbar">
  <div class="topbar-inner">
    <a class="logo" href="https://iamnews.org">
      <span class="logo-iam">IAM</span>
      <span class="logo-news">News</span>
    </a>
    <div class="topbar-spacer"></div>
    <div class="topbar-updated" id="updated"></div>
  </div>
</header>

<main class="page" id="main">
  <div class="state-box">
    <div class="spinner"></div>
    <p>Loading IAM news…</p>
  </div>
</main>

<footer role="contentinfo">Updated daily · IAM News</footer>

<script>
// ── AD CONFIG ──────────────────────────────────────────────────────────────
// To show an ad, fill in the fields below and set SHOW_AD = true.
// Leave SHOW_AD = false to hide the ad slot entirely.
const AD = {
  show: false,
  title: "Your ad headline here",
  description: "One sentence describing your product or service for IAM professionals.",
  advertiser: "Your Company Name",
  image: "",       // URL to a 1200x628px image
  url: "",         // Click-through URL
  position: 5,     // Insert ad after this many news items (e.g. 5 = after 5th story)
};

// ── HELPERS ────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initials(source) {
  return (source || '?').charAt(0).toUpperCase();
}

function sourceDot(source) {
  return `<span class="source-dot">${initials(source)}</span>`;
}

// ── CARD BUILDERS ──────────────────────────────────────────────────────────
function heroCard(a) {
  const img = a.image
    ? `<div class="hero-img-wrap"><img class="hero-img" src="${esc(a.image)}" alt="" loading="lazy" onerror="this.parentElement.remove()"></div>`
    : '';
  return `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="hero-card">
    ${img}
    <div class="hero-body">
      <div class="hero-source">${sourceDot(a.source)}<span class="source-name">${esc(a.source)}</span></div>
      <div class="hero-title">${esc(a.title)}</div>
      <div class="hero-summary">${esc(a.summary)}</div>
      <div class="hero-meta">${esc(a.date)}</div>
    </div>
  </a>`;
}

function smallCard(a) {
  const img = a.image
    ? `<div class="small-img-wrap"><img class="small-img" src="${esc(a.image)}" alt="" loading="lazy" onerror="this.parentElement.remove()"></div>`
    : '';
  return `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="small-card">
    ${img}
    <div class="small-body">
      <div class="small-source">${sourceDot(a.source)}<span class="source-name">${esc(a.source)}</span></div>
      <div class="small-title">${esc(a.title)}</div>
      <div class="small-summary">${esc(a.summary)}</div>
      <div class="small-meta">${esc(a.date)}</div>
    </div>
  </a>`;
}

function newsItem(a) {
  const thumb = a.image
    ? `<img class="news-thumb" src="${esc(a.image)}" alt="" loading="lazy" onerror="this.remove()">`
    : '';
  return `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="news-item">
    <div class="news-text">
      <div class="news-source">${sourceDot(a.source)}<span class="news-source-name">${esc(a.source)}</span></div>
      <div class="news-title">${esc(a.title)}</div>
      <div class="news-summary">${esc(a.summary)}</div>
      <div class="news-meta">${esc(a.date)}</div>
    </div>
    ${thumb}
  </a>`;
}

function adItem() {
  const thumb = AD.image
    ? `<img class="ad-thumb" src="${esc(AD.image)}" alt="" loading="lazy" onerror="this.remove()">`
    : '';
  return `<a href="${esc(AD.url)}" target="_blank" rel="noopener sponsored" class="ad-item">
    <div class="ad-text">
      <span class="ad-label">Sponsored</span>
      <div class="ad-title">${esc(AD.title)}</div>
      <div class="ad-description">${esc(AD.description)}</div>
      <div class="ad-advertiser">${esc(AD.advertiser)}</div>
    </div>
    ${thumb}
  </a>`;
}

// ── LOAD ───────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch('news.json?t=' + Date.now());
    if (!res.ok) throw new Error('news.json not found — run the fetch script first.');
    const data = await res.json();

    document.getElementById('updated').textContent = data.updated ? 'Updated ' + data.updated : '';

    const topStories = data.top_stories || [];
    const news = data.news || [];

    if (topStories.length === 0 && news.length === 0) throw new Error('No articles found.');

    let html = '';

    // ── Top Stories ──
    if (topStories.length > 0) {
      const hero = topStories[0];
      const rest = topStories.slice(1);
      html += `<section>
        <div class="section-header">Top stories</div>
        <div class="top-stories-grid">
          ${heroCard(hero)}
          ${rest.map(a => smallCard(a)).join('')}
        </div>
      </section>`;
    }

    // ── News Feed ──
    if (news.length > 0) {
      const items = news.map((a, i) => {
        let out = newsItem(a);
        if (AD.show && i === AD.position - 1) {
          out += adItem();
        }
        return out;
      }).join('');

      html += `<section>
        <div class="section-header">News</div>
        <div class="news-feed">${items}</div>
      </section>`;
    }

    document.getElementById('main').innerHTML = html;

    // Inject article structured data
    const allArticles = [...topStories, ...news];
    const schema = {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Latest IAM News",
      "itemListElement": allArticles.slice(0, 10).map((a, i) => ({
        "@type": "ListItem",
        "position": i + 1,
        "url": a.url,
        "name": a.title
      }))
    };
    const sd = document.createElement('script');
    sd.type = 'application/ld+json';
    sd.textContent = JSON.stringify(schema);
    document.head.appendChild(sd);

    if (topStories[0]) {
      document.title = topStories[0].title + ' – IAM News';
    }

  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div class="error-box">Could not load news: ${esc(e.message)}</div>`;
  }
}

load();
</script>
</body>
</html>
